apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: user-b-metrics
  namespace: user-b-namespace
spec:
  mode: deployment
  env:
    - name: NR_KEY
      valueFrom:
        secretKeyRef:
          name: nr-secret
          key: license-key
  config: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: 'app'
              kubernetes_sd_configs: [{role: pod}]
    exporters:
      otlphttp:
        endpoint: https://otlp.nr-data.net
        headers: 
          api-key: ${env:NR_KEY}
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [otlphttp]
